# Per-repo no-mistakes overrides for the portfolio hub.
#
# The repo-native proof is authoritative locally; the deploy target is
# the vibe Hetzner box (scripts/deploy-vibe.sh), not Vercel. See
# infra/handoff.md for the cutover packet.

commands:
  test: "npm run proof"

# Keep test evidence out of this public repo; no-mistakes stores it in a temp dir.
test:
  evidence:
    store_in_repo: false
